name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    # Alternatively, you can run on tags:
    # tags:
    #   - 'v*'

jobs:
  build-and-push:
    # Uses the tag we just set up earlier for our Gitea action runner
    runs-on: production
    
    strategy:
      matrix:
        service: [storefront, admin, voice-router]

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.jahandco.dev
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.jahandco.dev/store-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from: type=registry,ref=registry.jahandco.dev/store-${{ matrix.service }}:buildcache
          # cache-to: type=registry,ref=registry.jahandco.dev/store-${{ matrix.service }}:buildcache,mode=max
