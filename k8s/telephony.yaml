apiVersion: apps/v1
kind: Deployment
metadata:
  name: telephony
  namespace: ecom
  labels:
    app: telephony
    tags.datadoghq.com/env: "production-store"
    tags.datadoghq.com/service: "store-telephony"
    tags.datadoghq.com/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telephony
  template:
    metadata:
      labels:
        app: telephony
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "production-store"
        tags.datadoghq.com/service: "store-telephony"
        tags.datadoghq.com/version: "latest"
      annotations:
        ad.datadoghq.com/telephony.logs: '[{"source": "nodejs", "service": "store-telephony"}]'
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: telephony
          image: registry.jahandco.dev/store/telephony:latest
          ports:
            - containerPort: 3000
          env:
            - name: DD_ENV
              value: "production-store"
            - name: DD_SERVICE
              value: "store-telephony"
            - name: DD_VERSION
              value: "latest"
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: telephony-secret
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: telephony-secret
                  key: NEXTAUTH_SECRET
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: telephony-secret
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: telephony-secret
                  key: VAPID_PRIVATE_KEY
            - name: VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: telephony-secret
                  key: VAPID_SUBJECT
                  optional: true
          envFrom:
            - configMapRef:
                name: phone-config
            - secretRef:
                name: postgres-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: telephony
  namespace: ecom
spec:
  selector:
    app: telephony
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telephony-ingress
  namespace: ecom
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: myresolver
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - voice.jahandco.dev
  rules:
    - host: voice.jahandco.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: telephony
                port:
                  number: 80
---
# telephony-secret: create or update this manually with your real values.
# All values must be base64-encoded.
#
# To generate VAPID keys:
#   npx web-push generate-vapid-keys
#
# Quick create (replace placeholder values):
#   kubectl create secret generic telephony-secret -n ecom \
#     --from-literal=NEXTAUTH_URL=https://voice.jahandco.dev \
#     --from-literal=NEXTAUTH_SECRET=<random-32-char-string> \
#     --from-literal=VAPID_PUBLIC_KEY=<vapid-public-key> \
#     --from-literal=VAPID_PRIVATE_KEY=<vapid-private-key> \
#     --from-literal=VAPID_SUBJECT=mailto:admin@jahandco.dev
#
# The telephony app also reads TELNYX_API_KEY, LIVEKIT_*, GOOGLE_API_KEY,
# SMTP_*, and DATABASE_URL from the existing phone-config ConfigMap and
# postgres-secret Secret (via envFrom above).
apiVersion: v1
kind: Secret
metadata:
  name: telephony-secret
  namespace: ecom
type: Opaque
stringData:
  NEXTAUTH_URL: "https://voice.jahandco.dev"
  NEXTAUTH_SECRET: "REPLACE_WITH_RANDOM_SECRET"
  VAPID_PUBLIC_KEY: "REPLACE_WITH_VAPID_PUBLIC_KEY"
  VAPID_PRIVATE_KEY: "REPLACE_WITH_VAPID_PRIVATE_KEY"
  VAPID_SUBJECT: "mailto:admin@jahandco.dev"
