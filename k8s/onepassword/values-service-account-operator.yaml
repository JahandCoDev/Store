# Installs the 1Password Kubernetes Operator using a 1Password service account.
#
# IMPORTANT:
# - Do NOT commit raw service account tokens.
# - This values file is safe to commit; pass the token at install time.

connect:
  create: false

operator:
  create: true
  authMethod: service-account
  watchNamespace:
    - ecom
  serviceAccountToken:
    name: onepassword-service-account-token
    key: token
    value: ""