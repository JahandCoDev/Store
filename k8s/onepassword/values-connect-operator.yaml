# Installs 1Password Connect for in-cluster runtime access.
#
# IMPORTANT:
# - Do NOT commit your Connect token or 1password-credentials.json.
# - This values file is safe to commit; pass secrets at install time.
# - The filename is kept for continuity, but the operator is disabled.

connect:
  create: true
  serviceType: ClusterIP

operator:
  create: false
