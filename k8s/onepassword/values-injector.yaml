# Installs the 1Password Kubernetes Secrets Injector (mutating webhook).
#
# Notes:
# - Injection only happens for pods/deployments annotated with:
#   operator.1password.io/inject: "<container-name>[, <container-name>]"
# - You should also set the OP CLI version on the pod template annotations:
#   operator.1password.io/version: "2"  (or "2-beta")
# - The namespace must be labeled: secrets-injection=enabled
# - Injected secrets require the target container to define `command` (see 1Password docs).
# - Each injected container must also be configured with 1Password CLI auth:
#   - Connect: OP_CONNECT_HOST + OP_CONNECT_TOKEN
#   - OR Service Accounts: OP_SERVICE_ACCOUNT_TOKEN

injector:
  applicationName: secrets-injector
