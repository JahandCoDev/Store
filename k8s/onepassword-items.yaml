# OnePassword Connect Operator items
# - Fill in each spec.itemPath to point at the correct 1Password vault + item.
# - The operator will create/update a Kubernetes Secret with the same name as this resource.
# - Namespace is `ecom` for all resources in this repo.

apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: postgres-secret
  namespace: ecom
spec:
  # Example formats (pick one that matches your setup):
  # - vaults/<VaultName>/items/<ItemTitle>
  # - vaults/<VaultID>/items/<ItemID>
  itemPath: "vaults/ProductionSecrets/items/Ecom-Secrets"

---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: admin-secret
  namespace: ecom
spec:
  itemPath: "vaults/ProductionSecrets/items/Ecom-Secrets"

---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: storefront-secret
  namespace: ecom
spec:
  itemPath: "vaults/ProductionSecrets/items/Ecom-Secrets"

---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: phone-secret
  namespace: ecom
spec:
  itemPath: "vaults/ProductionSecrets/items/Ecom-Secrets"
