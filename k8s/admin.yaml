apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: ecom
  labels:
    app: admin
    tags.datadoghq.com/env: "production-store"
    tags.datadoghq.com/service: "store-admin"
    tags.datadoghq.com/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "production-store"
        tags.datadoghq.com/service: "store-admin"
        tags.datadoghq.com/version: "latest"
      annotations:
        ad.datadoghq.com/admin.logs: '[{"source": "nodejs", "service": "store-admin"}]'
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: admin
        image: registry.jahandco.dev/store/admin:latest
        imagePullPolicy: Always
        command: ["sh", "-lc"]
        args:
          - "npx prisma db push --accept-data-loss --config prisma.config.ts && npm start"
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: NEXTAUTH_SECRET
        - name: NEXTAUTH_URL
          value: "https://admin.jahandco.dev"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_USER
              optional: true
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_PASS
              optional: true
        - name: QUOTE_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: QUOTE_FROM_EMAIL
        - name: QUOTE_TO_EMAIL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: QUOTE_TO_EMAIL
        - name: QUOTE_SIGNATURE_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: QUOTE_SIGNATURE_NAME
              optional: true
        - name: QUOTE_SIGNATURE_TITLE
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: QUOTE_SIGNATURE_TITLE
              optional: true
        - name: QUOTE_SIGNATURE_IMAGE_URL
          value: "https://jahandco.net/signature.PNG"
        - name: NODE_ENV
          value: "production"
        - name: DD_ADMIN_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DD_ADMIN_APP_TOKEN
        - name: CI_DASHBOARD_TOKEN
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: CI_DASHBOARD_TOKEN
        - name: CORE_SHOP_OWNER_EMAIL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: CORE_SHOP_OWNER_EMAIL
        - name: DD_ENV
          value: "production-store"
        - name: DD_SERVICE
          value: "store-admin"
        - name: DD_VERSION
          value: "latest"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
  namespace: ecom
spec:
  selector:
    app: admin
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: ecom
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - admin.jahandco.dev
      secretName: admin-tls
  rules:
    - host: admin.jahandco.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-svc
                port:
                  number: 80



