apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: ecom
  labels:
    app: admin
    tags.datadoghq.com/env: "production-store"
    tags.datadoghq.com/service: "store-admin"
    tags.datadoghq.com/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "production-store"
        tags.datadoghq.com/service: "store-admin"
        tags.datadoghq.com/version: "latest"
      annotations:
        ad.datadoghq.com/admin.logs: '[{"source": "nodejs", "service": "store-admin"}]'
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: admin
        image: registry.jahandco.dev/store/admin:latest
        imagePullPolicy: Always
        command: ["node", "scripts/start-with-connect.mjs", "--", "sh", "-lc"]
        args:
          - "npx prisma db push --accept-data-loss --config prisma.config.ts && npm start"
        ports:
        - containerPort: 3000
        env:
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_ENDPOINT
        - name: S3_REGION
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_REGION
        - name: S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_BUCKET
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_ACCESS_KEY_ID
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_SECRET_ACCESS_KEY
        - name: S3_FORCE_PATH_STYLE
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_FORCE_PATH_STYLE
        - name: S3_PUBLIC_BASE_URL
          valueFrom:
            secretKeyRef:
              name: minio-s3-secret
              key: S3_PUBLIC_BASE_URL
        - name: NEXTAUTH_URL
          value: "https://admin.jahandco.dev"
        - name: QUOTE_SIGNATURE_IMAGE_URL
          value: "https://jahandco.net/signature.PNG"
        - name: NODE_ENV
          value: "production"
        - name: OP_CONNECT_HOST
          value: "http://onepassword-connect:8080"
        - name: OP_CONNECT_TOKEN
          valueFrom:
            secretKeyRef:
              name: onepassword-connect-token
              key: token
        - name: OP_CONNECT_VAULT
          value: "Ecom"
        - name: OP_CONNECT_ITEMS
          value: "App-Secrets"
        - name: DD_ENV
          value: "production-store"
        - name: DD_SERVICE
          value: "store-admin"
        - name: DD_VERSION
          value: "latest"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
  namespace: ecom
spec:
  selector:
    app: admin
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: ecom
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - admin.jahandco.dev
      secretName: admin-tls
  rules:
    - host: admin.jahandco.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-svc
                port:
                  number: 80



