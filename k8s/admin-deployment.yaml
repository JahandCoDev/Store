apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: store
  labels:
    app: admin
    tags.datadoghq.com/env: "production-store"
    tags.datadoghq.com/service: "store-admin"
    tags.datadoghq.com/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "production-store"
        tags.datadoghq.com/service: "store-admin"
        tags.datadoghq.com/version: "latest"
      annotations:
        ad.datadoghq.com/admin.logs: '[{"source": "nodejs", "service": "store-admin"}]'
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: admin
        image: registry.jahandco.dev/store/admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: admin-secret
              key: NEXTAUTH_SECRET
        - name: NEXTAUTH_URL
          value: "https://admin.jahandco.dev"
        - name: ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: admin-secret
              key: ADMIN_EMAIL
        - name: ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: admin-secret
              key: ADMIN_PASSWORD_HASH
        - name: NODE_ENV
          value: "production"
        - name: DD_ENV
          value: "production-store"
        - name: DD_SERVICE
          value: "store-admin"
        - name: DD_VERSION
          value: "latest"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
  namespace: store
spec:
  selector:
    app: admin
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: store
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: myresolver
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - admin.jahandco.dev
  rules:
    - host: admin.jahandco.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-svc
                port:
                  number: 80

---
# Secret template — provide real values via Sealed Secrets/Vault/1Password.
apiVersion: v1
kind: Secret
metadata:
  name: admin-secret
  namespace: store
type: Opaque
stringData:
  NEXTAUTH_SECRET: "admin_secret"
  ADMIN_EMAIL: "admin@jahandco.dev"
  # bcrypt hash (recommended). Generate with:
  # node -e "const bcrypt=require('bcryptjs'); console.log(bcrypt.hashSync(process.argv[1], 10));" "your-password"
  ADMIN_PASSWORD_HASH: "$2b$10$JkGB1CRbOLUVTmmY2SjoMeVUI5OD0pdO28rph/kLFHoR8k1vJwXqK"


