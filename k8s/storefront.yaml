apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: ecom
  labels:
    app: storefront
    tags.datadoghq.com/env: "production-store"
    tags.datadoghq.com/service: "store-storefront"
    tags.datadoghq.com/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
        admission.datadoghq.com/enabled: "true"
        tags.datadoghq.com/env: "production-store"
        tags.datadoghq.com/service: "store-storefront"
        tags.datadoghq.com/version: "latest"
      annotations:
        ad.datadoghq.com/storefront.logs: '[{"source": "nodejs", "service": "store-storefront"}]'
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: storefront
        image: registry.jahandco.dev/store/storefront:latest
        imagePullPolicy: Always
        command: ["sh", "-lc"]
        args:
          - "npx prisma db execute --config prisma.config.ts --file prisma/sql/ensure_user_displayid_seq.sql && npx prisma db push --accept-data-loss --config prisma.config.ts && npm start"
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL
        - name: NEXT_PUBLIC_SITE_URL
          value: "https://jahandco.net"
        - name: NEXTAUTH_URL
          value: "https://jahandco.net"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: NEXTAUTH_SECRET
        - name: QUOTE_SIGNATURE_IMAGE_PATH
          value: "/app/public/signature.PNG"
        - name: NODE_ENV
          value: "production"
        - name: DD_ENV
          value: "production-store"
        - name: DD_SERVICE
          value: "store-storefront"
        - name: DD_VERSION
          value: "latest"

        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "3Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: storefront-svc
  namespace: ecom
spec:
  selector:
    app: storefront
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storefront-ingress
  namespace: ecom
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: ecom-storefront-redirect-https@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - jahandco.net
        - shop.jahandco.net
        - dev.jahandco.net
      secretName: storefront-tls
  rules:
    - host: jahandco.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-svc
                port:
                  number: 80
    - host: shop.jahandco.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-svc
                port:
                  number: 80
    - host: dev.jahandco.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-svc
                port:
                  number: 80

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: storefront-redirect-https
  namespace: ecom
spec:
  redirectScheme:
    scheme: https
    permanent: true

